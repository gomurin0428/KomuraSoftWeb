<script>
  (() => {
    const siteHeader = document.querySelector('.site-header');
    const siteNav = document.querySelector('.site-nav');
    const mobileMenuToggle = document.querySelector('[data-mobile-menu-toggle]');

    if (!siteHeader || !siteNav || !mobileMenuToggle) {
      return;
    }

    function updateMobileMenuToggle() {
      const isOpen = siteHeader.classList.contains('is-mobile-nav-open');
      mobileMenuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }

    function setMobileNavOpen(isOpen) {
      siteHeader.classList.toggle('is-mobile-nav-open', isOpen);
      siteNav.hidden = !isOpen;
      if (!isOpen) {
        closeDropdowns();
      }
      updateMobileMenuToggle();
    }

    const navDropdowns = Array.from(document.querySelectorAll('.nav-dropdown'));

    function closeDropdowns() {
      navDropdowns.forEach((dropdown) => {
        dropdown.classList.remove('is-open');
        const toggle = dropdown.querySelector('.nav-dropdown-toggle');
        if (toggle) {
          toggle.setAttribute('aria-expanded', 'false');
        }
      });
    }

    navDropdowns.forEach((dropdown) => {
      const toggle = dropdown.querySelector('.nav-dropdown-toggle');
      if (!toggle) {
        return;
      }

      toggle.addEventListener('click', (event) => {
        event.preventDefault();
        const willOpen = !dropdown.classList.contains('is-open');
        closeDropdowns();
        if (willOpen) {
          dropdown.classList.add('is-open');
          toggle.setAttribute('aria-expanded', 'true');
        }
      });
    });

    mobileMenuToggle.addEventListener('click', () => {
      setMobileNavOpen(!siteHeader.classList.contains('is-mobile-nav-open'));
    });

    siteNav.addEventListener('click', (event) => {
      const clickedLink = event.target instanceof Element ? event.target.closest('a') : null;
      if (!clickedLink) {
        return;
      }
      setMobileNavOpen(false);
    });

    document.addEventListener('click', (event) => {
      const eventTarget = event.target instanceof Element ? event.target : null;
      if (!eventTarget || !eventTarget.closest('.nav-dropdown')) {
        closeDropdowns();
      }
      if (!eventTarget || !eventTarget.closest('.site-header')) {
        setMobileNavOpen(false);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setMobileNavOpen(false);
      }
    });

    updateMobileMenuToggle();
    setMobileNavOpen(false);
  })();
</script>

title: KomuraSoft
description: Windowsアプリケーション開発を中心とした受託開発サービス
url: https://comcomponent.com
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
future: true

include:
  - .well-known

# Exclude from build
exclude:
  - README.md
  - CNAME
  - docs
  - 2026-03-11-tcp-retransmission-rfc1323-industrial-camera.md
  - 001-handle-leak-industrial-camera-long-run-crash-part1.md
  - 002-application-verifier-abnormal-test-foundation-part2.md
  - wpf-winforms-ui-thread-async-await-one-sheet.md
  - activex-ocx-keep-wrap-replace-decision-table.md

# Permalink for posts
permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

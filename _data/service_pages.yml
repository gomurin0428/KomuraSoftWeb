ja:
  - title: "ホームページ制作・SEO対策"
    url: "/services/website-development-seo/"
    summary: "技術系・B2B向けに、何をしている会社かが伝わるサイト構成、サービスページ、検索導線、問い合わせ導線をまとめて整えます。"
  - title: "ホームページ制作"
    url: "/services/website-development/"
    summary: "トップページ、サービスページ、会社情報、問い合わせ導線まで含めて、伝わるホームページへ整理します。"
  - title: "SEO対策・問い合わせ導線改善"
    url: "/services/seo-lead-optimization/"
    summary: "title、見出し、内部リンク、記事導線、問い合わせページを見直し、検索から相談につながる土台を整えます。"
  - title: "Windows開発"
    url: "/services/windows-development/"
    summary: "Windows受託開発の入口ページです。既存の 5 サービスと技術相談・不具合調査をまとめて案内します。"
  - title: "Windowsアプリ開発"
    url: "/services/windows-app-development/"
    summary: "業務アプリ、装置連携、通信ツールなどの Windows ソフトを要件整理から設計・開発まで対応します。"
  - title: "不具合調査・原因解析"
    url: "/services/bug-investigation/"
    summary: "再現しにくい不具合、長期稼働後の障害、通信停止などをログ・観測・切り分けで調査します。"
  - title: "技術相談・設計レビュー"
    url: "/services/technical-consulting/"
    summary: "改修方針、技術選定、境界設計、既存資産の扱いを整理したいときの相談入口です。"
  - title: "既存Windowsソフトの改修・保守"
    url: "/services/windows-modernization-maintenance/"
    summary: "既存システムの機能追加、保守、段階的モダナイゼーションを安全に進めます。"
  - title: "既存資産活用・移行支援"
    url: "/services/legacy-asset-migration/"
    summary: "COM / ActiveX / OCX や 32bit / 64bit 制約を抱える既存資産の活用と移行を支援します。"

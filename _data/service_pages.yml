ja:
  - title: "Windowsアプリ開発"
    url: "/services/windows-app-development/"
    summary: "業務アプリ、装置連携、監視ツールなどの Windows ソフトを要件整理から設計・実装まで支援します。"
  - title: "不具合調査・原因解析"
    url: "/services/bug-investigation/"
    summary: "再現しにくい不具合や長期稼働後の障害を、ログ・計測・再現試験で切り分けます。"
  - title: "技術相談・設計レビュー"
    url: "/services/technical-consulting/"
    summary: "改修方針や技術選定、設計レビューを通じて、進め方と判断材料を整理します。"
  - title: "既存Windowsソフトの改修・保守"
    url: "/services/windows-modernization-maintenance/"
    summary: "既存 Windows ソフトを壊さずに、機能追加、保守、段階的な modernize を進めます。"
  - title: "既存資産活用・移行支援"
    url: "/services/legacy-asset-migration/"
    summary: "COM / ActiveX / OCX や 32bit / 64bit を含む既存資産の再利用と移行を支援します。"
en:
  - title: "Windows App Development"
    url: "/en/services/windows-app-development/"
    summary: "Support for new Windows software from requirements and design through implementation."
  - title: "Bug Investigation & Root Cause Analysis"
    url: "/en/services/bug-investigation/"
    summary: "Investigation for rare failures, long-running issues, and root cause isolation with evidence."
  - title: "Technical Consulting & Design Review"
    url: "/en/services/technical-consulting/"
    summary: "Support for change planning, technology decisions, architecture review, and design risk checks."
  - title: "Windows Software Maintenance & Modernization"
    url: "/en/services/windows-modernization-maintenance/"
    summary: "Safe feature additions, maintenance, and staged modernization for existing Windows software."
  - title: "Legacy Asset Reuse & Migration Support"
    url: "/en/services/legacy-asset-migration/"
    summary: "Support for reuse and migration of COM, ActiveX, OCX, and other legacy Windows assets."

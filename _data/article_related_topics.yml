ja:
  default_topic_ids:
    - topics-hub
  topics:
    - id: topics-hub
      title: "技術トピック"
      url: "/topics/"
      description: "技術記事と関連サービスを課題別にたどれる一覧ページです。近いテーマから調査や相談の入口を探せます。"
    - id: activex-migration
      title: "ActiveX / 移行テーマ"
      url: "/topics/activex-migration/"
      description: "COM / ActiveX / OCX を残すか置き換えるか迷うときに、保守・移行の考え方をまとめて追えるテーマページです。"
    - id: bitness-interop
      title: "32bit / 64bit テーマ"
      url: "/topics/32bit-64bit/"
      description: "32bit / 64bit 相互運用、C++/CLI 境界、ネイティブ DLL 連携の論点をまとめて確認できるテーマページです。"
    - id: generic-host-app-architecture
      title: "Generic Host / アプリ設計テーマ"
      url: "/topics/generic-host-app-architecture/"
      description: "Generic Host、BackgroundService、DI、設定、ログ、起動と停止の設計をまとめて辿れるテーマページです。"
    - id: ui-threading-timers
      title: "UI スレッド / 定期処理テーマ"
      url: "/topics/ui-threading-timers/"
      description: "WPF / WinForms、UI スレッド、async/await、Dispatcher、タイマーの使い分けをまとめて見られるテーマページです。"
    - id: bug-investigation-long-run
      title: "不具合調査 / 長期稼働テーマ"
      url: "/topics/bug-investigation-long-run/"
      description: "再現しにくい障害、通信停止、長期稼働後のクラッシュ、異常系テスト基盤をまとめて辿れるテーマページです。"
  rules:
    - match_tags:
        - COM
        - ActiveX
        - OCX
        - OLE
        - STA
        - MTA
        - レガシー技術
      topic_ids:
        - activex-migration
    - match_tags:
        - 32bit
        - 64bit
        - C++/CLI
        - ネイティブ連携
        - Native AOT
      topic_ids:
        - bitness-interop
    - match_tags:
        - Generic Host
        - Worker
        - BackgroundService
      topic_ids:
        - generic-host-app-architecture
    - match_tags:
        - WPF
        - WinForms
        - UI
        - スレッド
        - async/await
        - タイマー
      topic_ids:
        - ui-threading-timers
    - match_tags:
        - 不具合調査
        - TCP
        - ネットワーク
        - 産業用カメラ
        - ハンドルリーク
        - ログ設計
        - Application Verifier
        - 異常系テスト
      topic_ids:
        - bug-investigation-long-run

ja:
  default_topic_ids:
    - topics-hub
  topics:
    - id: topics-hub
      title: "Windows技術トピック"
      url: "/topics/"
      description: "Windows 開発、不具合調査、既存資産活用の技術トピックをまとめた入口です。"
    - id: web-topics
      title: "Web制作・SEOトピック"
      url: "/web-topics/"
      description: "ホームページ制作、SEO対策、サービスページ設計、内部リンク、問い合わせ導線改善をまとめた入口です。"
    - id: activex-migration
      title: "ActiveX / 移行テーマ"
      url: "/topics/activex-migration/"
      description: "COM / ActiveX / OCX を残すか、包むか、置き換えるかを整理するトピックです。"
    - id: bitness-interop
      title: "32bit / 64bit テーマ"
      url: "/topics/32bit-64bit/"
      description: "32bit / 64bit、ネイティブ連携、C++/CLI まわりを整理するトピックです。"
    - id: generic-host-app-architecture
      title: "Generic Host / アプリ設計テーマ"
      url: "/topics/generic-host-app-architecture/"
      description: "Generic Host、DI、BackgroundService、構成設計を整理するトピックです。"
    - id: ui-threading-timers
      title: "UI スレッド / タイマーテーマ"
      url: "/topics/ui-threading-timers/"
      description: "WPF / WinForms、UI スレッド、async/await、タイマー設計を整理するトピックです。"
    - id: bug-investigation-long-run
      title: "不具合調査 / 長期稼働テーマ"
      url: "/topics/bug-investigation-long-run/"
      description: "再現しにくい不具合、通信停止、長期稼働障害、失敗パス検証を整理するトピックです。"
  rules:
    - match_tags:
        - ホームページ制作
        - SEO
        - 問い合わせ導線改善
        - 既存サイト改善
        - サービスページ設計
        - 内部リンク
        - Google広告
        - Google広告運用
        - 検索集客
        - デジタル広告
      topic_ids:
        - web-topics
    - match_tags:
        - COM
        - ActiveX
        - OCX
        - OLE
        - STA
        - MTA
        - レガシー技術
      topic_ids:
        - activex-migration
    - match_tags:
        - 32bit
        - 64bit
        - C++/CLI
        - ネイティブ連携
        - Native AOT
      topic_ids:
        - bitness-interop
    - match_tags:
        - Generic Host
        - Worker
        - BackgroundService
      topic_ids:
        - generic-host-app-architecture
    - match_tags:
        - WPF
        - WinForms
        - UI
        - スレッド
        - async/await
        - タイマー
      topic_ids:
        - ui-threading-timers
    - match_tags:
        - 不具合調査
        - TCP
        - ネットワーク
        - 産業用カメラ
        - ハンドルリーク
        - ログ設計
        - Application Verifier
        - 失敗パステスト
      topic_ids:
        - bug-investigation-long-run
